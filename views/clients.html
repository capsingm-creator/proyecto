<section>
<div class="invoices-client-container">
    <h1>Invoices Client</h1>
    
    <section class="search-section">
        <form id="invoice-search-form">
            <label for="search-query">Search Invoice Client:</label>
            <input type="text" id="search-query" name="lpa_inv_client_ID" placeholder="Number of Client">
            <button type="submit" id="search-btn">Search</button>
        </form>
    </section>

    <section class="results-section">
        <table id="invoices-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Client</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="invoices-body">
                
            </tbody>
        </table>
        <div id="total-row" class="total-row">Total: <span id="total-sum">$0.00</span></div>
    </section>
    <div id="invoice-message"></div>
</div>
</section>
